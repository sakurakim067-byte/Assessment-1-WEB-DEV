<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Petrol Calculator</title>
  <link rel="stylesheet" href="6.css">
  >
</head>
<body>
  <main class="page">
    <!--Heading-->
    <h1>Petrol Calculator</h1>

    <br> <!--space in between-->

    <label>Price per liter:</label>
    <input id="price" type="number" step="0.01" value="1.72"> <!--required value-->

    <label>Liters:</label>
    <input id="liters" type="number" step="0.01" value="0"> <!--required value-->

    <button id="calc">Calculate</button> <!--button-->

    <p id="result">Total: AED 0.00</p> <!--final result-->

  </main>

  <script src="6.js"></script> 
</body>
</html>
